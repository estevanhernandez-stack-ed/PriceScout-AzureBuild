[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Exclude standalone scripts from test collection
addopts = --ignore=scripts/ --ignore=test_scraper_hulen.py --ignore=test_ent_baseline.py

filterwarnings =
    ignore::RuntimeWarning:app.notification_service
